services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: query-frontend
    depends_on:
      - main-server
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    ports:
      - "3001:3000"
    restart: unless-stopped

  main-server:
    build:
      context: ./nestjs-api
      dockerfile: Dockerfile
    container_name: query-main-server
    depends_on:
      postgres:
        condition: service_healthy
      python-query-service:
        condition: service_started
    environment:
      PORT: 3000
      FILE_STORAGE_ROOT: /app/uploads
      PYTHON_QUERY_SERVICE_URL: http://python-query-service:8001/api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: query_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/query_db
      JWT_SECRET: your-jwt-secret
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: your-bucket-name
      AWS_ACCESS_KEY_ID: your-access-key
      AWS_SECRET_ACCESS_KEY: your-secret-key
      AWS_S3_ENDPOINT: ""
      AWS_S3_FORCE_PATH_STYLE: "false"
    ports:
      - "3000:3000"
    volumes:
      - shared_uploads:/app/uploads
    restart: unless-stopped

  python-query-service:
    build:
      context: ./python-query-service
      dockerfile: Dockerfile
    container_name: query-python-query-service
    env_file:
      - ./python-query-service/.env
    environment:
      SHARED_UPLOADS_ROOT: /app/uploads
      APP_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - shared_uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: query-postgres
    environment:
      POSTGRES_DB: query_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d query_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  shared_uploads:
  postgres_data:
